<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <!-- Shadow -->
  <ellipse cx="60" cy="136" rx="34" ry="5" fill="rgba(0,0,0,0.13)"/>

  <!-- Handle arch -->
  <path d="M42 28 Q42 10 60 10 Q78 10 78 28" fill="none" stroke="#C8960A" stroke-width="9" stroke-linecap="round"/>

  <!-- Spout base -->
  <rect x="50" y="20" width="20" height="10" rx="4" fill="#E8A800"/>
  <!-- Spout cap -->
  <rect x="53" y="14" width="14" height="8" rx="3.5" fill="#C8960A"/>
  <!-- Cap ridge -->
  <rect x="51" y="13" width="18" height="3" rx="1.5" fill="#A07800"/>

  <!-- Body -->
  <rect x="14" y="28" width="92" height="98" rx="12" fill="#FFC107"/>

  <!-- Body highlight (left face lift) -->
  <rect x="14" y="28" width="18" height="98" rx="12" fill="rgba(255,255,255,0.18)"/>

  <!-- Horizontal ridges for water-can character -->
  <rect x="14" y="62" width="92" height="5" rx="2.5" fill="rgba(0,0,0,0.06)"/>
  <rect x="14" y="82" width="92" height="5" rx="2.5" fill="rgba(0,0,0,0.06)"/>
  <rect x="14" y="102" width="92" height="5" rx="2.5" fill="rgba(0,0,0,0.06)"/>

  <!-- Vertical side panel lines -->
  <rect x="28" y="28" width="4" height="98" rx="2" fill="rgba(0,0,0,0.05)"/>
  <rect x="88" y="28" width="4" height="98" rx="2" fill="rgba(0,0,0,0.05)"/>

  <!-- charity: water droplet logo area -->
  <circle cx="60" cy="82" r="18" fill="rgba(255,255,255,0.22)"/>
  <!-- Water drop shape -->
  <path d="M60 68 C60 68 48 79 48 86 C48 92.6 53.4 98 60 98 C66.6 98 72 92.6 72 86 C72 79 60 68 60 68Z" fill="rgba(0,120,200,0.55)"/>
  <!-- Drop highlight -->
  <ellipse cx="56" cy="82" rx="3" ry="5" fill="rgba(255,255,255,0.45)" transform="rotate(-20,56,82)"/>

  <!-- Bottom edge shadow -->
  <rect x="14" y="118" width="92" height="8" rx="0 0 12 12" fill="rgba(0,0,0,0.07)"/>
</svg>
